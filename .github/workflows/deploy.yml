name: Deploy FTP to mattiamarcanti.it [TEST]

on:
  push:
    branches: ["main"] 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp version
        run: |
          VERSION=$(git describe --tags --always)
          YEAR=$(git log -1 --format=%cd --date=format:%Y)
          find . -type f \( -name '*.html' -o -name '*.php' \) \
            -exec sed -i "s/%%VERSION%%/$VERSION/g; s/%%YEAR%%/$YEAR/g" {} +

      - name: Deploy to Aruba hosting mattiamarcanti.it via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}      
          username: ${{ secrets.FTP_USER }}       
          password: ${{ secrets.FTP_PASSWORD }}   
          protocol: ftps
          port: 21

          # 📌 CARTELLA DI DESTINAZIONE SUL SERVER
          server-dir: /calcoloOreSettimanali/

          # 📌 CARTELLA LOCALE DA CARICARE (tutto il repo)
          local-dir: ./

          # opzionale: sovrascrivi sempre
          dangerous-clean-slate: false
