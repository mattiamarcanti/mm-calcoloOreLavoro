name: Deploy to GitHub Pages & FTP Test

on:
  push:
    branches: ["main"]

# Permessi necessari per GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy concorrenti
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── GitHub Pages ───────────────────────────────
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp version
        run: |
          VERSION=$(git describe --tags --always)
          YEAR=$(git log -1 --format=%cd --date=format:%Y)
          find . -type f \( -name '*.html' -o -name '*.php' -o -name '*.js' \) \
            -exec sed -i "s/%%VERSION%%/$VERSION/g; s/%%YEAR%%/$YEAR/g" {} +

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── FTP Test ───────────────────────────────────
  deploy-ftp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp version
        run: |
          VERSION=$(git describe --tags --always)
          YEAR=$(git log -1 --format=%cd --date=format:%Y)
          find . -type f \( -name '*.html' -o -name '*.php' -o -name '*.js' \) \
            -exec sed -i "s/%%VERSION%%/$VERSION/g; s/%%YEAR%%/$YEAR/g" {} +

      - name: Deploy to Aruba hosting mattiamarcanti.it via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21

          # 📌 CARTELLA DI DESTINAZIONE SUL SERVER
          server-dir: /calcoloOreSettimanali/

          # 📌 CARTELLA LOCALE DA CARICARE (tutto il repo)
          local-dir: ./

          # opzionale: sovrascrivi sempre
          dangerous-clean-slate: false
